<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donor Dashboard - FoodShare</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/app.js"></script>
</head>

<body>
    <nav class="navbar">
        <div class="logo">FoodShare | Donor</div>
        <div class="nav-links">
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="dashboard-container">
        <h2>Post a Donation</h2>
        <form id="donationForm" style="max-width: 500px; margin-top: 20px;">
            <input type="text" id="foodName" placeholder="Food Name (e.g., 5 Loaves of Bread)" required>
            <input type="text" id="quantity" placeholder="Quantity/Servings" required>
            <input type="datetime-local" id="expiry" required>
            <input type="text" id="address" placeholder="Pickup Address" required>
            <input type="text" id="imageUrl" placeholder="Optional Image URL">
            <button type="submit" class="btn">Submit Donation</button>
        </form>
        <p id="donationMsg" class="message"></p>

        <h2 style="margin-top: 40px;">My Donations</h2>
        <div class="card-grid" id="donationsList">
            <!-- Dynamically populated -->
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            const role = localStorage.getItem('role');

            if (!token || role !== 'Donor') {
                window.location.href = 'index.html';
                return;
            }

            const API_URL = 'http://localhost:5000/api';

            const fetchDonations = async () => {
                try {
                    const res = await fetch(`${API_URL}/donations/my-donations`, {
                        headers: { 'x-auth-token': token }
                    });
                    const donations = await res.json();
                    const list = document.getElementById('donationsList');
                    list.innerHTML = '';

                    donations.forEach(d => {
                        list.innerHTML += `
              <div class="card">
                <h3>${d.food_name}</h3>
                <p><strong>Quantity:</strong> ${d.quantity}</p>
                <p><strong>Expiry:</strong> ${new Date(d.expiry_date).toLocaleString()}</p>
                <p><strong>Address:</strong> ${d.address}</p>
                <span class="status-badge ${d.status.toLowerCase()}">${d.status}</span>
                ${d.qr_code ? `<img src="${d.qr_code}" alt="QR Code" class="qr">` : ''}
              </div>
            `;
                    });
                } catch (err) {
                    console.error(err);
                }
            };

            await fetchDonations();

            document.getElementById('donationForm').onsubmit = async (e) => {
                e.preventDefault();
                const food_name = document.getElementById('foodName').value;
                const quantity = document.getElementById('quantity').value;
                const expiry_date = document.getElementById('expiry').value;
                const address = document.getElementById('address').value;
                const image_url = document.getElementById('imageUrl').value;

                try {
                    const res = await fetch(`${API_URL}/donations`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'x-auth-token': token
                        },
                        body: JSON.stringify({ food_name, quantity, expiry_date, address, image_url })
                    });

                    if (res.ok) {
                        document.getElementById('donationMsg').textContent = 'Donation posted successfully!';
                        document.getElementById('donationMsg').className = 'message success';
                        document.getElementById('donationForm').reset();
                        fetchDonations();
                    } else {
                        console.error('Failed to post donation');
                    }
                } catch (err) {
                    console.error(err);
                }
            };
        });
    </script>
</body>

</html>
