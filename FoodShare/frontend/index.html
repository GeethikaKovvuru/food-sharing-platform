<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodShare - Share Surplus Food</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <div class="logo">FoodShare</div>
        <div class="nav-links">
            <a href="#about">About</a>
            <a href="#" id="loginBtn">Login</a>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>Share Food, Spread Love</h1>
            <p>Connect with local donors and receivers to eliminate food waste.</p>
            <div class="role-buttons">
                <button class="cta-btn donor-btn" id="donorBtn">I am a Donor</button>
                <button class="cta-btn receiver-btn" id="receiverBtn">I am a Receiver</button>
            </div>
        </div>
    </header>

    <!-- Auth Modal -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3 id="authRoleTitle" style="text-align: center; color: var(--primary); margin-bottom: 15px;"></h3>
            <div class="auth-tabs">
                <button class="tab-btn active" id="tabLogin">Login</button>
                <button class="tab-btn" id="tabSignup">Signup</button>
            </div>

            <form id="loginForm" class="auth-form">
                <h2>Login</h2>
                <input type="email" id="loginEmail" placeholder="Email" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button type="submit" class="btn">Login</button>
            </form>

            <form id="signupForm" class="auth-form hidden">
                <h2>Signup</h2>
                <input type="text" id="signupName" placeholder="Full Name" required>
                <input type="email" id="signupEmail" placeholder="Email" required>
                <input type="password" id="signupPassword" placeholder="Password" required>
                <input type="hidden" id="signupRole" value="">
                <button type="submit" class="btn">Register</button>
            </form>
            <p id="authMessage" class="message"></p>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
